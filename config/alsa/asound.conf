# ALSA Configuration for HiFiBerry DAC+ ADC Pro
# Copy this file to /etc/asound.conf
#
# Sets HiFiBerry as the default audio device for both playback and capture.
# This is REQUIRED for the DMX controller to capture audio input.

pcm.!default {
    type hw
    card sndrpihifiberry
}

ctl.!default {
    type hw
    card sndrpihifiberry
}

# Alias for explicit access
pcm.hifiberry {
    type hw
    card sndrpihifiberry
}

ctl.hifiberry {
    type hw
    card sndrpihifiberry
}
